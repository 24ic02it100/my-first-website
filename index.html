<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARMIT CLOTHES | Premium Clothing Brand</title>
    <style>
        /* Modern & Clean Global Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
        }
        header {
            background-color: #ffffff;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .hero {
            background-color: #f0e6df;
            padding: 60px 20px;
            text-align: center;
        }
        .hero h2 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        .hero p {
            font-size: 18px;
            color: #666;
        }
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .section-title {
            text-align: center;
            font-size: 24px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        /* Modern Flexbox Grid Layout */
        .products-grid {
            display: flex;
            gap: 20px;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .product-card {
            background: #fff;
            padding: 15px;
            text-align: center;
            border: 1px solid #eee;
            flex: 1;
            min-width: 280px;
            box-sizing: border-box;
        }
        .product-img-box {
            background-color: #eee;
            height: 350px; /* Thoda height bada kiya hai premium look ke liye */
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Image stretch nahi hogi aur perfectly fit dikhegi */
        }
        .product-title {
            font-size: 18px;
            margin: 10px 0 5px 0;
            font-weight: 600;
        }
        .product-price {
            color: #b12704;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .buy-btn {
            background-color: #111;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            display: inline-block;
            transition: background 0.3s ease;
        }
        .buy-btn:hover {
            background-color: #444;
        }
        footer {
            background-color: #111;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1>HARMIT CLOTHES</h1>
    </header>

    <div class="hero">
        <h2>SUMMER COLLECTION 2026</h2>
        <p>Get up to 40% off on all premium outfits.</p>
    </div>

    <div class="container">
        <div class="section-title">Our Best Sellers</div>
        
        <div class="products-grid">
            <div class="product-card">
                <div class="product-img-box">
                    <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=500&auto=format&fit=crop&q=80" alt="Oversized Cotton T-Shirt" class="product-img">
                </div>
                <div class="product-title">Oversized Cotton T-Shirt</div>
                <div class="product-price">₹999</div>
                <a href="#" class="buy-btn">Buy Now</a>
            </div>
            
            <div class="product-card">
                <div class="product-img-box">
                    <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=500&auto=format&fit=crop&q=80" alt="Classic Urban Hoodie" class="product-img">
                </div>
                <div class="product-title">Classic Urban Hoodie</div>
                <div class="product-price">₹1,999</div>
                <a href="#" class="buy-btn">Buy Now</a>
            </div>
            
            <div class="product-card">
                <div class="product-img-box">
                    <img src="https://images.unsplash.com/photo-1517423568366-8b83523034fd?w=500&auto=format&fit=crop&q=80" alt="Relaxed Fit Cargo Pants" class="product-img">
                </div>
                <div class="product-title">Relaxed Fit Cargo Pants</div>
                <div class="product-price">₹1,499</div>
                <a href="#" class="buy-btn">Buy Now</a>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Urban Wear. All Rights Reserved.</p>
    </footer>

</body>
</html>
